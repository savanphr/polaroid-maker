<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Polaroid Maker V5</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>

html,body{
margin:0;
padding:0;
background:#111;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
overflow:hidden;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
touch-action:none;
}

.topbar{
position:absolute;
top:env(safe-area-inset-top);
left:0;
right:0;
height:60px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
font-weight:600;
}

.controls{

position:absolute;
bottom:calc(25px + env(safe-area-inset-bottom));
left:0;
right:0;

display:flex;
justify-content:center;
gap:15px;

}

.button{

border-radius:28px;
padding:14px 22px;
font-weight:600;
font-size:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);

}

.import{
background:#0A84FF;
color:white;
}

.export{
background:#30D158;
color:white;
}

input[type=file]{
display:none;
}

</style>

</head>

<body>

<div class="topbar">Polaroid Maker v</div>

<input type="file" id="upload" accept="image/*">

<canvas id="canvas"></canvas>

<div class="controls">

<label class="button import" for="upload">
Importer photo
</label>

<button class="button export" id="exportBtn">
Exporter 300dpi
</button>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const upload=document.getElementById("upload")
const exportBtn=document.getElementById("exportBtn")

let img=new Image()

let scale=1
let posX=0
let posY=0

let startDist=null
let startScale=1

const frameWidth=canvas.width*0.8
const frameHeight=frameWidth*1.21

const photoWidth=frameWidth*0.86
const photoHeight=photoWidth*1.01

const frameX=(canvas.width-frameWidth)/2
const frameY=(canvas.height-frameHeight)/2

const photoX=frameX+(frameWidth-photoWidth)/2
const photoY=frameY+20


function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.fillRect(frameX,frameY,frameWidth,frameHeight)

ctx.save()

ctx.beginPath()
ctx.rect(photoX,photoY,photoWidth,photoHeight)
ctx.clip()

if(img.src){

const w=img.width*scale
const h=img.height*scale

ctx.drawImage(
img,
photoX+posX,
photoY+posY,
w,
h
)

}

ctx.restore()

}

draw()


upload.addEventListener("change",function(){

const file=this.files[0]

if(!file) return

const reader=new FileReader()

reader.onload=function(e){

img.onload=function(){

scale=photoWidth/img.width
posX=0
posY=0

draw()

}

img.src=e.target.result

}

reader.readAsDataURL(file)

})


// déplacement

let dragging=false
let startX,startY

canvas.addEventListener("pointerdown",e=>{

dragging=true
startX=e.clientX
startY=e.clientY

})

canvas.addEventListener("pointermove",e=>{

if(!dragging) return

posX+=e.clientX-startX
posY+=e.clientY-startY

startX=e.clientX
startY=e.clientY

draw()

})

canvas.addEventListener("pointerup",()=>dragging=false)


// pinch zoom

canvas.addEventListener("touchmove",function(e){

if(e.touches.length==2){

e.preventDefault()

let dx=e.touches[0].clientX-e.touches[1].clientX
let dy=e.touches[0].clientY-e.touches[1].clientY

let dist=Math.sqrt(dx*dx+dy*dy)

if(!startDist){

startDist=dist
startScale=scale

}else{

scale=startScale*(dist/startDist)

draw()

}

}

})

canvas.addEventListener("touchend",()=>{

startDist=null

})


// export 300 dpi avec coins carrés

exportBtn.addEventListener("click", async ()=>{

  const exportCanvas = document.createElement("canvas")
  exportCanvas.width = 1051
  exportCanvas.height = 1276

  const ectx = exportCanvas.getContext("2d")

  // cadre Polaroid complet
  ectx.fillStyle = "white"
  ectx.fillRect(0,0,1051,1276)

  // dimensions fenêtre photo
  const photoExportW = 909
  const photoExportH = 921
  const bottomMarginPx = 22*11.81 // 22mm en pixels ≈ 260px
  const photoExportY = exportCanvas.height - bottomMarginPx - photoExportH
  const photoExportX = (exportCanvas.width - photoExportW)/2

  // clipping pour coins carrés
  ectx.save()
  ectx.beginPath()
  ectx.rect(photoExportX, photoExportY, photoExportW, photoExportH)
  ectx.clip()

  // appliquer zoom et position
  const scaleFactor = photoExportW / photoWidth

  ectx.drawImage(
    img,
    -posX/scale,
    -posY/scale,
    img.width,
    img.height,
    photoExportX,
    photoExportY,
    img.width*scale*scaleFactor,
    img.height*scale*scaleFactor
  )

  ectx.restore()

  // export direct iOS / fallback
  exportCanvas.toBlob(async function(blob){

    const file = new File([blob], "polaroid_300dpi.png", { type:"image/png" })

    if(navigator.canShare && navigator.canShare({ files:[file] })){
      try{
        await navigator.share({ files:[file], title:"Polaroid", text:"Voici votre photo Polaroid" })
      }catch(err){
        console.log("Partage annulé:", err)
      }
    }else{
      const link = document.createElement("a")
      link.href = URL.createObjectURL(blob)
      link.download = "polaroid_300dpi.png"
      link.click()
    }

  }, "image/png")

})

if('serviceWorker' in navigator){

navigator.serviceWorker.register("sw.js")

}

</script>

</body>
</html>
